<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 Days · 6 Games</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,8vw,3.5rem);font-weight:800;color:#00ff88;text-shadow:0 0 40px rgba(0,255,136,0.3);margin-bottom:.25rem}
.sub{color:#555566;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;width:100%;max-width:700px}
.card{border:1px solid #1e1e2e;background:#111118;padding:1.5rem 1.25rem;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s;position:relative;overflow:hidden}
.card:hover{border-color:#00ff88;transform:translateY(-2px)}
.card.locked{opacity:.35;cursor:not-allowed}
.day{font-size:.55rem;letter-spacing:.15em;color:#555566;text-transform:uppercase;margin-bottom:.5rem}
.name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.25rem}
.card:not(.locked) .name{color:#00ff88}
.status{font-size:.6rem;letter-spacing:.1em;color:#555566}
.card:not(.locked) .status{color:#00cc66}
</style>
</head>
<body>
<h1>6 GAMES</h1>
<div class="sub">6 days · 6 games · 1 file each</div>
<div class="grid">
  <a class="card" href="day-01-snake/">
    <div class="day">Day 01</div>
    <div class="name">🐍 Snake</div>
    <div class="status">▶ Play now</div>
  </a>
  <div class="card locked"><div class="day">Day 02</div><div class="name">🧱 Breakout</div><div class="status">Coming soon</div></div>
  <div class="card locked"><div class="day">Day 03</div><div class="name">💣 Minesweeper</div><div class="status">Coming soon</div></div>
  <div class="card locked"><div class="day">Day 04</div><div class="name">🎯 Reaction</div><div class="status">Coming soon</div></div>
  <div class="card locked"><div class="day">Day 05</div><div class="name">🔢 2048</div><div class="status">Coming soon</div></div>
  <div class="card locked"><div class="day">Day 06</div><div class="name">👾 Space Shooter</div><div class="status">Coming soon</div></div>
</div>
</body>
</html>
