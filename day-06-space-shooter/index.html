<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE SHOOTER — Day 6 of 6</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #02010a;
  --accent: #00eeff;
  --accent2: #ff2266;
  --yellow: #ffdd00;
  --green: #00ff88;
  --muted: #334466;
  --text: #cce8ff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.75rem;
  overflow: hidden;
  user-select: none;
}
.header { text-align: center; margin-bottom: 0.6rem; }
.series-tag { font-size: 0.55rem; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.25rem; }
.game-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.6rem, 6vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,238,255,0.5), 0 0 60px rgba(0,238,255,0.2);
  line-height: 1;
}
.hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 420px;
  margin-bottom: 0.5rem;
  padding: 0 2px;
}
.hud-stat { text-align: center; }
.hud-label { font-size: 0.48rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; }
.hud-val { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--accent); }
.lives-row { display: flex; gap: 4px; justify-content: center; margin-top: 2px; }
.life-icon { font-size: 0.7rem; transition: opacity 0.3s; }
.life-icon.dead { opacity: 0.15; }

.canvas-wrap {
  position: relative;
  border: 1px solid rgba(0,238,255,0.2);
  box-shadow: 0 0 30px rgba(0,238,255,0.06), inset 0 0 30px rgba(0,0,10,0.8);
}
canvas { display: block; }

/* Mobile controls */
.mobile-hud {
  display: none;
  gap: 0.6rem;
  margin-top: 0.75rem;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 420px;
}
@media (max-width: 600px) { .mobile-hud { display: flex; } }
.move-btns { display: flex; gap: 0.4rem; }
.ctrl-btn {
  background: rgba(0,238,255,0.06);
  border: 1px solid rgba(0,238,255,0.2);
  color: var(--accent);
  font-size: 1.2rem;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.ctrl-btn:active { background: rgba(0,238,255,0.18); }
.fire-btn {
  background: rgba(255,34,102,0.1);
  border-color: rgba(255,34,102,0.4);
  color: var(--accent2);
  width: 70px; height: 52px;
  font-size: 0.65rem;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 0.08em;
  border-radius: 6px;
  border: 1px solid;
}
.fire-btn:active { background: rgba(255,34,102,0.25); }

.footer { margin-top: 0.6rem; font-size: 0.52rem; letter-spacing: 0.1em; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<div class="header">
  <div class="series-tag">6 Days · 6 Games · Day 06 — Final</div>
  <div class="game-title">SPACE SHOOTER</div>
</div>

<div class="hud">
  <div class="hud-stat">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="scoreHud">0</div>
  </div>
  <div class="hud-stat">
    <div class="hud-label">Lives</div>
    <div class="lives-row" id="livesHud">
      <span class="life-icon" id="l1">🚀</span>
      <span class="life-icon" id="l2">🚀</span>
      <span class="life-icon" id="l3">🚀</span>
    </div>
  </div>
  <div class="hud-stat">
    <div class="hud-label">Wave</div>
    <div class="hud-val" id="waveHud">1</div>
  </div>
  <div class="hud-stat">
    <div class="hud-label">Best</div>
    <div class="hud-val" id="bestHud">0</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div class="mobile-hud">
  <div class="move-btns">
    <button class="ctrl-btn" id="btnL">◄</button>
    <button class="ctrl-btn" id="btnR">►</button>
  </div>
  <button class="ctrl-btn fire-btn" id="btnFire">FIRE</button>
</div>

<div class="footer">Arrow / A D to move · Space to shoot · P pause</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive sizing
const MAX_W = 420, MAX_H = 560;
let W, H, scl;
function resize() {
  const mw = Math.min(window.innerWidth - 16, MAX_W);
  scl = mw / MAX_W;
  W = Math.round(MAX_W * scl);
  H = Math.round(MAX_H * scl);
  canvas.width = W; canvas.height = H;
}
resize();

// --- State ---
let player, bullets, enemies, particles, powerups;
let score, best, lives, wave, running, paused, gameOver;
let stars = [];
let keys = {};
let shootCooldown = 0;
let waveTimer = 0;
let bossActive = false, boss = null;
let shakeFrames = 0;
let bgmPhase = 0;

// Mobile control state
let mobileLeft = false, mobileRight = false, mobileFire = false;

// --- Init ---
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 * scl,
      speed: (0.3 + Math.random() * 0.8) * scl,
      alpha: 0.2 + Math.random() * 0.6,
    });
  }
}

function initGame() {
  score = 0; lives = 3; wave = 1;
  gameOver = false; paused = false; bossActive = false; boss = null;
  shootCooldown = 0; waveTimer = 0; shakeFrames = 0;
  player = {
    x: W / 2, y: H - 50 * scl,
    w: 28 * scl, h: 22 * scl,
    speed: 4.5 * scl,
    invincible: 0,
    shield: false,
  };
  bullets = []; enemies = []; particles = []; powerups = [];
  best = parseInt(localStorage.getItem('ss-best') || '0');
  spawnWave(wave);
  updateHUD();
}

// --- Spawning ---
function spawnWave(w) {
  enemies = [];
  const cols = Math.min(8 + w, 12);
  const rows = Math.min(2 + Math.floor(w / 2), 5);
  const types = w >= 5 ? ['basic','fast','tank'] : w >= 3 ? ['basic','fast'] : ['basic'];
  const gap = (W - 20 * scl) / cols;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const type = types[Math.floor(Math.random() * types.length)];
      enemies.push({
        x: 10 * scl + c * gap + gap / 2,
        y: (30 + r * 36) * scl,
        w: 22 * scl, h: 16 * scl,
        type,
        hp: type === 'tank' ? 3 : 1,
        maxHp: type === 'tank' ? 3 : 1,
        dir: 1,
        speed: (0.6 + w * 0.08) * scl,
        shootTimer: Math.random() * 120,
        shootRate: type === 'fast' ? 60 : 100 - w * 3,
        row: r, col: c,
        flash: 0,
        alive: true,
      });
    }
  }

  // Boss every 4 waves
  if (w % 4 === 0) {
    bossActive = true;
    boss = {
      x: W / 2, y: 55 * scl,
      w: 60 * scl, h: 36 * scl,
      hp: 8 + w * 2, maxHp: 8 + w * 2,
      dir: 1, speed: (1.2 + w * 0.1) * scl,
      shootTimer: 0, phase: 0,
      flash: 0, alive: true,
    };
    enemies = [];
  }
}

// --- Bullets ---
function shootPlayer() {
  if (shootCooldown > 0) return;
  shootCooldown = 12;
  bullets.push({ x: player.x, y: player.y - player.h / 2, vy: -10 * scl, friendly: true, w: 3 * scl, h: 10 * scl });
  // Double shot with shield
  if (player.shield) {
    bullets.push({ x: player.x - 10 * scl, y: player.y - player.h / 2, vy: -10 * scl, friendly: true, w: 3 * scl, h: 10 * scl });
    bullets.push({ x: player.x + 10 * scl, y: player.y - player.h / 2, vy: -10 * scl, friendly: true, w: 3 * scl, h: 10 * scl });
  }
}

function enemyShoot(e) {
  const spread = e.type === 'fast' ? 3 : 0;
  bullets.push({ x: e.x, y: e.y + e.h / 2, vy: (3 + wave * 0.3) * scl, vx: (Math.random() - 0.5) * spread * scl, friendly: false, w: 3 * scl, h: 8 * scl });
}

function bossShoot() {
  const patterns = [
    // Straight
    [{ vx: 0, vy: 5 * scl }],
    // Spread 3
    [{ vx: -3 * scl, vy: 4 * scl }, { vx: 0, vy: 5 * scl }, { vx: 3 * scl, vy: 4 * scl }],
    // Spread 5
    [-2, -1, 0, 1, 2].map(i => ({ vx: i * 2 * scl, vy: 4.5 * scl })),
  ];
  const pat = patterns[boss.phase % patterns.length];
  pat.forEach(b => bullets.push({ x: boss.x, y: boss.y + boss.h / 2, vy: b.vy, vx: b.vx || 0, friendly: false, w: 4 * scl, h: 10 * scl, boss: true }));
}

// --- Particles ---
function explode(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (1 + Math.random() * 4) * scl;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, decay: 0.025 + Math.random() * 0.04, r: (1.5 + Math.random() * 3) * scl, color });
  }
}

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return;
  const types = ['shield', 'life', 'rapid'];
  powerups.push({ x, y, vy: 1.5 * scl, type: types[Math.floor(Math.random() * types.length)], life: 300, r: 9 * scl });
}

// --- Collision ---
function rectHit(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 && a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 && a.y + a.h/2 > b.y - b.h/2;
}

// --- Update ---
function update() {
  if (paused || gameOver) return;
  bgmPhase++;
  shakeFrames = Math.max(0, shakeFrames - 1);
  if (shootCooldown > 0) shootCooldown--;

  // Input
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'] || mobileLeft;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || mobileRight;
  const fire  = keys[' '] || mobileFire;

  if (left)  player.x = Math.max(player.w/2, player.x - player.speed);
  if (right) player.x = Math.min(W - player.w/2, player.x + player.speed);
  if (fire)  shootPlayer();
  if (player.invincible > 0) player.invincible--;

  // Stars
  stars.forEach(s => { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx || 0;
    b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Enemy movement + shooting
  if (!bossActive) {
    let hitWall = false;
    enemies.filter(e => e.alive).forEach(e => {
      e.x += e.dir * e.speed;
      if (e.x + e.w/2 >= W - 4*scl || e.x - e.w/2 <= 4*scl) hitWall = true;
      e.flash = Math.max(0, e.flash - 1);
      e.shootTimer--;
      if (e.shootTimer <= 0) { enemyShoot(e); e.shootTimer = Math.max(30, e.shootRate - wave * 2); }
    });
    if (hitWall) {
      enemies.filter(e => e.alive).forEach(e => { e.dir *= -1; e.y += 12 * scl; });
    }
  }

  // Boss movement
  if (bossActive && boss && boss.alive) {
    boss.x += boss.dir * boss.speed;
    if (boss.x + boss.w/2 >= W - 4*scl || boss.x - boss.w/2 <= 4*scl) boss.dir *= -1;
    boss.flash = Math.max(0, boss.flash - 1);
    boss.shootTimer--;
    if (boss.shootTimer <= 0) {
      bossShoot();
      boss.shootTimer = Math.max(20, 60 - wave * 2);
      boss.phase++;
    }
  }

  // Powerups
  powerups = powerups.filter(p => {
    p.y += p.vy; p.life--;
    if (p.life <= 0) return false;
    const dist = Math.hypot(p.x - player.x, p.y - player.y);
    if (dist < p.r + player.w/2) {
      if (p.type === 'shield') { player.shield = true; setTimeout(() => player.shield = false, 8000); }
      else if (p.type === 'life') { lives = Math.min(5, lives + 1); updateHUD(); }
      else if (p.type === 'rapid') { shootCooldown = 0; }
      explode(p.x, p.y, '#ffdd00', 8);
      return false;
    }
    return p.y < H + 20;
  });

  // Bullet-enemy collisions
  bullets.forEach(b => {
    if (!b.friendly) return;
    // Boss
    if (bossActive && boss && boss.alive) {
      if (Math.abs(b.x - boss.x) < boss.w/2 && Math.abs(b.y - boss.y) < boss.h/2) {
        boss.hp--; boss.flash = 6; b.dead = true;
        explode(b.x, b.y, '#ff2266', 6);
        if (boss.hp <= 0) {
          boss.alive = false;
          explode(boss.x, boss.y, '#ff2266', 30);
          explode(boss.x - 15*scl, boss.y, '#ffdd00', 15);
          explode(boss.x + 15*scl, boss.y, '#00eeff', 15);
          score += 500 * wave;
          shakeFrames = 20;
          bossActive = false;
          spawnPowerup(boss.x, boss.y);
          updateHUD();
        }
      }
    }
    // Enemies
    enemies.filter(e => e.alive).forEach(e => {
      if (b.dead) return;
      if (Math.abs(b.x - e.x) < e.w/2 && Math.abs(b.y - e.y) < e.h/2) {
        e.hp--; e.flash = 5; b.dead = true;
        explode(b.x, b.y, typeColor(e.type), 4);
        if (e.hp <= 0) {
          e.alive = false;
          explode(e.x, e.y, typeColor(e.type), 10);
          spawnPowerup(e.x, e.y);
          score += (e.type === 'tank' ? 30 : e.type === 'fast' ? 20 : 10) * wave;
          updateHUD();
        }
      }
    });
  });
  bullets = bullets.filter(b => !b.dead);

  // Enemy bullets hit player
  if (player.invincible === 0) {
    bullets.forEach(b => {
      if (b.friendly || b.dead) return;
      const hit = Math.abs(b.x - player.x) < player.w/2 - 2*scl && Math.abs(b.y - player.y) < player.h/2;
      if (hit) {
        b.dead = true;
        if (player.shield) { player.shield = false; explode(player.x, player.y, '#00eeff', 8); return; }
        hitPlayer();
      }
    });
    bullets = bullets.filter(b => !b.dead);
  }

  // Enemy reaches bottom / hits player
  enemies.filter(e => e.alive).forEach(e => {
    if (e.y + e.h/2 > H - 20*scl) { loseLife(); e.alive = false; }
    if (player.invincible === 0 && rectHit(player, e)) { hitPlayer(); e.alive = false; explode(e.x, e.y, typeColor(e.type), 8); }
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05*scl; p.vx *= 0.97; p.life -= p.decay;
    return p.life > 0;
  });

  // Wave clear
  const allDead = bossActive ? (!boss || !boss.alive) : enemies.every(e => !e.alive);
  if (allDead && !bossActive || (bossActive && boss && !boss.alive && !bossActive)) {
    if (!bossActive) {
      waveTimer++;
      if (waveTimer > 60) { wave++; waveTimer = 0; spawnWave(wave); updateHUD(); }
    }
  }
  if (!bossActive && enemies.every(e => !e.alive)) {
    waveTimer++;
    if (waveTimer > 60) { wave++; waveTimer = 0; bossActive = false; boss = null; spawnWave(wave); updateHUD(); }
  }
}

function typeColor(t) {
  return t === 'tank' ? '#ff2266' : t === 'fast' ? '#ffdd00' : '#00eeff';
}

function hitPlayer() {
  loseLife();
  player.invincible = 120;
  shakeFrames = 10;
  explode(player.x, player.y, '#ff2266', 12);
}

function loseLife() {
  lives--;
  updateHUD();
  if (lives <= 0) endGame();
}

function endGame() {
  gameOver = true;
  best = Math.max(best, score);
  localStorage.setItem('ss-best', best);
  updateHUD();
}

// --- Draw ---
function draw() {
  ctx.save();
  if (shakeFrames > 0) {
    const s = shakeFrames * 1.2;
    ctx.translate((Math.random()-.5)*s, (Math.random()-.5)*s);
  }

  // Background
  ctx.fillStyle = '#02010a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Nebula glow
  const neb = ctx.createRadialGradient(W*.3, H*.4, 0, W*.3, H*.4, W*.5);
  neb.addColorStop(0, 'rgba(0,40,80,0.15)');
  neb.addColorStop(1, 'transparent');
  ctx.fillStyle = neb;
  ctx.fillRect(0, 0, W, H);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Powerups
  powerups.forEach(p => {
    const pulse = 0.7 + 0.3*Math.sin(bgmPhase*0.1);
    ctx.globalAlpha = Math.min(1, p.life/30) * pulse;
    const colors = { shield: '#00eeff', life: '#00ff88', rapid: '#ffdd00' };
    const icons  = { shield: '🛡', life: '❤', rapid: '⚡' };
    ctx.shadowColor = colors[p.type]; ctx.shadowBlur = 10;
    ctx.font = `${14*scl}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(icons[p.type], p.x, p.y);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  });

  // Enemies
  enemies.filter(e => e.alive).forEach(e => drawEnemy(e));
  if (bossActive && boss && boss.alive) drawBoss(boss);

  // Player bullets
  bullets.filter(b => b.friendly).forEach(b => {
    ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#00eeff';
    ctx.beginPath(); ctx.roundRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h, b.w/2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemy bullets
  bullets.filter(b => !b.friendly).forEach(b => {
    const col = b.boss ? '#ff9900' : '#ff2266';
    ctx.shadowColor = col; ctx.shadowBlur = 6;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.roundRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h, b.w/2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Player
  drawPlayer();

  // Overlays
  if (!running) drawStartScreen();
  else if (paused) drawPause();
  else if (gameOver) drawGameOver();

  // Wave banner
  if (waveTimer > 0 && waveTimer < 50) {
    ctx.globalAlpha = Math.min(1, (50 - waveTimer) / 15);
    ctx.fillStyle = '#ffdd00';
    ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 20;
    ctx.font = `bold ${22*scl}px 'Orbitron', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`WAVE ${wave}`, W/2, H/2);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible/6)%2 === 0) return;
  const x = player.x, y = player.y, w = player.w, h = player.h;

  // Shield ring
  if (player.shield) {
    ctx.strokeStyle = 'rgba(0,238,255,0.5)';
    ctx.lineWidth = 2; ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(x, y, w*0.75, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Ship body
  ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#00eeff';
  ctx.beginPath();
  ctx.moveTo(x, y - h/2);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.lineTo(x + w*0.15, y + h*0.25);
  ctx.lineTo(x - w*0.15, y + h*0.25);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#002244';
  ctx.beginPath(); ctx.ellipse(x, y, w*0.15, h*0.2, 0, 0, Math.PI*2); ctx.fill();

  // Engine glow
  const flame = ctx.createLinearGradient(x, y+h*0.2, x, y+h*0.6+Math.sin(bgmPhase*0.3)*3*scl);
  flame.addColorStop(0, 'rgba(255,140,0,0.9)');
  flame.addColorStop(1, 'rgba(255,60,0,0)');
  ctx.fillStyle = flame; ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(x-w*0.12, y+h*0.25);
  ctx.lineTo(x+w*0.12, y+h*0.25);
  ctx.lineTo(x, y+h*0.6+Math.sin(bgmPhase*0.3)*4*scl);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  const col = e.flash > 0 ? '#ffffff' : typeColor(e.type);
  ctx.shadowColor = col; ctx.shadowBlur = 8;
  ctx.fillStyle = col;

  if (e.type === 'tank') {
    // Hexagon
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 - Math.PI/2;
      i===0 ? ctx.moveTo(x+Math.cos(a)*w/2, y+Math.sin(a)*h/2) : ctx.lineTo(x+Math.cos(a)*w/2, y+Math.sin(a)*h/2);
    }
    ctx.closePath(); ctx.fill();
    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#330000'; ctx.shadowBlur = 0;
      ctx.fillRect(x-w/2, y-h/2-5*scl, w, 3*scl);
      ctx.fillStyle = '#ff2266';
      ctx.fillRect(x-w/2, y-h/2-5*scl, w*(e.hp/e.maxHp), 3*scl);
    }
  } else if (e.type === 'fast') {
    // Diamond
    ctx.beginPath();
    ctx.moveTo(x, y-h/2); ctx.lineTo(x+w/2, y); ctx.lineTo(x, y+h/2); ctx.lineTo(x-w/2, y);
    ctx.closePath(); ctx.fill();
  } else {
    // Classic invader shape
    ctx.beginPath();
    ctx.moveTo(x-w/2, y+h/2);
    ctx.lineTo(x-w/2, y-h*0.1);
    ctx.lineTo(x-w*0.25, y-h/2);
    ctx.lineTo(x+w*0.25, y-h/2);
    ctx.lineTo(x+w/2, y-h*0.1);
    ctx.lineTo(x+w/2, y+h/2);
    ctx.lineTo(x+w*0.2, y+h*0.2);
    ctx.lineTo(x-w*0.2, y+h*0.2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#02010a';
    ctx.beginPath(); ctx.arc(x-w*0.18, y-h*0.1, w*0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.18, y-h*0.1, w*0.1, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawBoss(b) {
  const x = b.x, y = b.y, w = b.w, h = b.h;
  const col = b.flash > 0 ? '#ffffff' : '#ff2266';
  ctx.shadowColor = col; ctx.shadowBlur = 20;
  ctx.fillStyle = col;

  // Main body
  ctx.beginPath();
  ctx.moveTo(x, y-h/2);
  ctx.lineTo(x+w/2, y-h*0.1);
  ctx.lineTo(x+w*0.4, y+h/2);
  ctx.lineTo(x-w*0.4, y+h/2);
  ctx.lineTo(x-w/2, y-h*0.1);
  ctx.closePath(); ctx.fill();

  // Wings
  ctx.fillStyle = b.flash > 0 ? '#ffffff' : '#cc0044';
  ctx.beginPath();
  ctx.moveTo(x+w*0.4, y);
  ctx.lineTo(x+w*0.7, y+h*0.4);
  ctx.lineTo(x+w*0.3, y+h*0.4);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-w*0.4, y);
  ctx.lineTo(x-w*0.7, y+h*0.4);
  ctx.lineTo(x-w*0.3, y+h*0.4);
  ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = '#ffdd00'; ctx.shadowColor = '#ffdd00';
  ctx.beginPath(); ctx.arc(x, y, w*0.12, 0, Math.PI*2); ctx.fill();

  // HP bar
  const bw = w*1.2, bh = 6*scl;
  ctx.fillStyle = '#330000'; ctx.shadowBlur = 0;
  ctx.fillRect(x-bw/2, y-h/2-12*scl, bw, bh);
  const hpPct = b.hp/b.maxHp;
  const hpCol = hpPct > 0.5 ? '#ff2266' : hpPct > 0.25 ? '#ff8800' : '#ffdd00';
  ctx.fillStyle = hpCol;
  ctx.fillRect(x-bw/2, y-h/2-12*scl, bw*hpPct, bh);
  ctx.strokeStyle = '#660022'; ctx.lineWidth = 1;
  ctx.strokeRect(x-bw/2, y-h/2-12*scl, bw, bh);

  // Boss label
  ctx.fillStyle = '#ff2266'; ctx.font = `bold ${8*scl}px 'Orbitron', sans-serif`;
  ctx.textAlign = 'center'; ctx.shadowColor = '#ff2266'; ctx.shadowBlur = 8;
  ctx.fillText('BOSS', x, y - h/2 - 16*scl);
  ctx.shadowBlur = 0;
}

function drawOverlayBg() {
  ctx.fillStyle = 'rgba(2,1,10,0.88)';
  ctx.fillRect(0, 0, W, H);
}

function drawStartScreen() {
  drawOverlayBg();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00eeff';
  ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 20;
  ctx.font = `900 ${28*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('SPACE', W/2, H/2 - 60*scl);
  ctx.fillText('SHOOTER', W/2, H/2 - 28*scl);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#334466'; ctx.font = `${8*scl}px 'Share Tech Mono', monospace`;
  ctx.fillText('6 DAYS · 6 GAMES · DAY 06 — FINAL', W/2, H/2 - 8*scl);
  ctx.fillStyle = '#ffdd00'; ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 10;
  ctx.font = `700 ${10*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('▶  PRESS SPACE / TAP TO START', W/2, H/2 + 16*scl);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#334466'; ctx.font = `${7*scl}px 'Share Tech Mono'`;
  ctx.fillText('ARROW KEYS / A D to move · SPACE to shoot', W/2, H/2 + 36*scl);
  ctx.fillText('BASIC +10  FAST +20  TANK +30  BOSS +500', W/2, H/2 + 50*scl);
  ctx.fillStyle = '#00ff88'; ctx.font = `${7*scl}px 'Share Tech Mono'`;
  ctx.fillText('🛡 SHIELD  ❤ EXTRA LIFE  ⚡ RAPID FIRE', W/2, H/2 + 66*scl);
  const b = parseInt(localStorage.getItem('ss-best')||'0');
  if (b > 0) {
    ctx.fillStyle = '#00eeff'; ctx.font = `${8*scl}px 'Orbitron', sans-serif`;
    ctx.fillText(`BEST: ${b}`, W/2, H/2 + 84*scl);
  }
}

function drawPause() {
  drawOverlayBg();
  ctx.textAlign = 'center'; ctx.fillStyle = '#ffdd00';
  ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 15;
  ctx.font = `900 ${22*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('PAUSED', W/2, H/2);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#334466'; ctx.font = `${7*scl}px 'Share Tech Mono'`;
  ctx.fillText('PRESS P TO RESUME', W/2, H/2 + 20*scl);
}

function drawGameOver() {
  drawOverlayBg();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff2266'; ctx.shadowColor = '#ff2266'; ctx.shadowBlur = 20;
  ctx.font = `900 ${22*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('GAME OVER', W/2, H/2 - 50*scl);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffdd00'; ctx.font = `900 ${28*scl}px 'Orbitron', sans-serif`;
  ctx.fillText(score, W/2, H/2 - 14*scl);
  ctx.fillStyle = '#334466'; ctx.font = `${7*scl}px 'Share Tech Mono'`;
  ctx.fillText(`BEST: ${best}   WAVE: ${wave}`, W/2, H/2 + 8*scl);
  ctx.fillStyle = '#00eeff'; ctx.shadowColor = '#00eeff'; ctx.shadowBlur = 10;
  ctx.font = `700 ${9*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('▶  SPACE / TAP TO RESTART', W/2, H/2 + 30*scl);
  ctx.shadowBlur = 0;

  // Series complete banner
  ctx.fillStyle = '#00ff88'; ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 12;
  ctx.font = `900 ${11*scl}px 'Orbitron', sans-serif`;
  ctx.fillText('🎉 6 OF 6 COMPLETE!', W/2, H/2 + 55*scl);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#334466'; ctx.font = `${6.5*scl}px 'Share Tech Mono'`;
  ctx.fillText('bihari-bhau.github.io/6-days-6-games', W/2, H/2 + 72*scl);
}

function updateHUD() {
  document.getElementById('scoreHud').textContent = score;
  document.getElementById('waveHud').textContent = wave;
  document.getElementById('bestHud').textContent = Math.max(best, score);
  ['l1','l2','l3'].forEach((id,i) => {
    document.getElementById(id).classList.toggle('dead', i >= lives);
  });
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { e.preventDefault(); handleAction(); }
  if (e.key === 'p' || e.key === 'P') { if (running && !gameOver) paused = !paused; }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', handleAction);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); }, {passive:false});

function handleAction() {
  if (!running) { running = true; initGame(); return; }
  if (gameOver) { initGame(); return; }
}

// Mobile buttons
document.getElementById('btnL').addEventListener('touchstart', e => { e.preventDefault(); mobileLeft = true; }, {passive:false});
document.getElementById('btnL').addEventListener('touchend', () => mobileLeft = false);
document.getElementById('btnR').addEventListener('touchstart', e => { e.preventDefault(); mobileRight = true; }, {passive:false});
document.getElementById('btnR').addEventListener('touchend', () => mobileRight = false);
document.getElementById('btnFire').addEventListener('touchstart', e => { e.preventDefault(); mobileFire = true; if (!running) { running = true; initGame(); } else if (gameOver) initGame(); }, {passive:false});
document.getElementById('btnFire').addEventListener('touchend', () => mobileFire = false);

// --- Game loop ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
running = false; gameOver = false; paused = false;
score = 0; lives = 3; wave = 1; best = parseInt(localStorage.getItem('ss-best')||'0');
initStars();
// Dummy player/bullets for star animation on start screen
player = { x: W/2, y: H - 50*scl, w: 28*scl, h: 22*scl, speed: 4.5*scl, invincible: 0, shield: false };
bullets = []; enemies = []; particles = []; powerups = [];
document.getElementById('bestHud').textContent = best;
loop();

window.addEventListener('resize', () => {
  resize(); initStars();
  if (running) initGame();
});
</script>
</body>
