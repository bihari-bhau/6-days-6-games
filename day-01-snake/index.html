<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE — Day 1 of 6</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --text: #e8e8f0;
    --muted: #555566;
    --grid-size: 20;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow: hidden;
    user-select: none;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .series-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .game-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,255,136,0.3);
  }

  .game-title span {
    color: var(--text);
    opacity: 0.15;
  }

  .stats-bar {
    display: flex;
    gap: 2rem;
    margin-bottom: 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .stat-label {
    color: var(--muted);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    min-width: 3ch;
    text-align: center;
    transition: color 0.1s;
  }

  .stat-value.flash {
    color: var(--accent3);
  }

  .canvas-wrapper {
    position: relative;
    border: 1px solid var(--border);
    background: var(--panel);
    outline: 1px solid var(--border);
    outline-offset: 4px;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(2px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .overlay-sub {
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }

  .overlay-score {
    font-family: 'Syne', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .overlay-best {
    color: var(--muted);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.75rem 2rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); }
  .btn:active { transform: scale(0.97); }

  .controls-hint {
    margin-top: 1rem;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
  }

  .controls-hint span {
    color: var(--text);
    opacity: 0.5;
  }

  .level-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Mobile D-pad */
  .dpad {
    display: none;
    margin-top: 1.25rem;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(3, 44px);
    gap: 4px;
  }

  @media (max-width: 600px) {
    .dpad { display: grid; }
  }

  .dpad-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }

  .dpad-btn:active { background: var(--border); }
  .dpad-btn.center { grid-column: 2; grid-row: 2; }

  .footer {
    margin-top: 1rem;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-align: center;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <div class="series-tag">6 Days · 6 Games · Day 01</div>
  <div class="game-title">SNAKE<span>.</span></div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Level</div>
    <div class="stat-value" id="level">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Length</div>
    <div class="stat-value" id="length">3</div>
  </div>
</div>

<div class="canvas-wrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- Start Overlay -->
  <div class="overlay" id="startOverlay">
    <div class="overlay-title" style="color: var(--accent)">SNAKE</div>
    <div class="overlay-sub">Classic arcade · v1.0</div>
    <button class="btn" onclick="startGame()">▶ &nbsp;Start Game</button>
    <div class="controls-hint">
      <span>↑ ↓ ← →</span> or <span>WASD</span> to move &nbsp;·&nbsp; <span>P</span> to pause
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="gameOverOverlay">
    <div class="overlay-title" style="color: var(--accent2)">GAME OVER</div>
    <div class="overlay-sub">You hit a wall</div>
    <div class="overlay-score" id="finalScore">0</div>
    <div class="overlay-best" id="finalBest">BEST — 0</div>
    <button class="btn" onclick="startGame()">↻ &nbsp;Play Again</button>
  </div>

  <!-- Pause Overlay -->
  <div class="overlay hidden" id="pauseOverlay">
    <div class="overlay-title" style="color: var(--accent3)">PAUSED</div>
    <div class="overlay-sub">Press P to resume</div>
    <button class="btn" onclick="togglePause()">▶ &nbsp;Resume</button>
  </div>

  <div class="level-badge" id="levelBadge">LVL 1</div>
</div>

<!-- Mobile D-pad -->
<div class="dpad">
  <div></div>
  <button class="dpad-btn" onclick="setDir(0,-1)">▲</button>
  <div></div>
  <button class="dpad-btn" onclick="setDir(-1,0)">◄</button>
  <button class="dpad-btn center" onclick="togglePause()" style="font-size:0.7rem; color: var(--muted)">⏸</button>
  <button class="dpad-btn" onclick="setDir(1,0)">►</button>
  <div></div>
  <button class="dpad-btn" onclick="setDir(0,1)">▼</button>
  <div></div>
</div>

<div class="footer">
  Arrow keys / WASD · P to pause · eat 🟩 to grow
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRID = 20;
let CELL, WIDTH_PX;

function resize() {
  const maxW = Math.min(window.innerWidth - 32, 500);
  CELL = Math.floor(maxW / GRID);
  WIDTH_PX = CELL * GRID;
  canvas.width = WIDTH_PX;
  canvas.height = WIDTH_PX;
}
resize();

let snake, dir, nextDir, food, specialFood, score, best, level, gameLoop, running, paused, stepCount, frameCount;

const COLORS = {
  bg: '#0d0d14',
  gridLine: 'rgba(255,255,255,0.03)',
  snakeHead: '#00ff88',
  snakeBody: '#00cc66',
  snakeTail: '#008844',
  snakeOutline: '#00ffaa',
  food: '#ff3366',
  foodGlow: 'rgba(255,51,102,0.4)',
  special: '#ffcc00',
  specialGlow: 'rgba(255,204,0,0.4)',
};

function initGame() {
  const mid = Math.floor(GRID / 2);
  snake = [
    {x: mid, y: mid},
    {x: mid-1, y: mid},
    {x: mid-2, y: mid},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  level = 1;
  stepCount = 0;
  frameCount = 0;
  specialFood = null;
  placeFood();
  updateStats();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function placeSpecial() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y) || (pos.x===food.x && pos.y===food.y));
  specialFood = {x: pos.x, y: pos.y, timer: 80};
}

function getSpeed() {
  return Math.max(60, 150 - (level - 1) * 12);
}

function startGame() {
  hideOverlays();
  clearInterval(gameLoop);
  initGame();
  running = true;
  paused = false;
  document.getElementById('startOverlay').classList.add('hidden');
  scheduleLoop();
  requestAnimationFrame(render);
}

function scheduleLoop() {
  gameLoop = setInterval(step, getSpeed());
}

function step() {
  if (!running || paused) return;

  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    return gameOver('You hit a wall');
  }
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver('Self-collision');
  }

  snake.unshift(head);
  stepCount++;

  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    score += level * 10;
    ate = true;
    placeFood();
    flashStat('score');
    if (stepCount % 8 === 0 && !specialFood) placeSpecial();
    const newLevel = Math.floor(score / 100) + 1;
    if (newLevel > level) {
      level = newLevel;
      clearInterval(gameLoop);
      scheduleLoop();
      document.getElementById('levelBadge').textContent = `LVL ${level}`;
      flashStat('level');
    }
    updateStats();
  }

  if (specialFood) {
    if (head.x === specialFood.x && head.y === specialFood.y) {
      score += level * 30;
      specialFood = null;
      ate = true;
      flashStat('score');
      updateStats();
    } else {
      specialFood.timer--;
      if (specialFood.timer <= 0) specialFood = null;
    }
  }

  if (!ate) snake.pop();
}

function gameOver(reason) {
  running = false;
  clearInterval(gameLoop);
  best = Math.max(best || 0, score);
  localStorage.setItem('snakeBest', best);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = `BEST — ${best}`;
  document.getElementById('gameOverOverlay').querySelector('.overlay-sub').textContent = reason;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
  updateStats();
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    document.getElementById('pauseOverlay').classList.remove('hidden');
  } else {
    document.getElementById('pauseOverlay').classList.add('hidden');
  }
}

function hideOverlays() {
  ['startOverlay','gameOverOverlay','pauseOverlay'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
}

function updateStats() {
  document.getElementById('score').textContent = score || 0;
  document.getElementById('best').textContent = best || parseInt(localStorage.getItem('snakeBest')) || 0;
  document.getElementById('level').textContent = level || 1;
  document.getElementById('length').textContent = snake ? snake.length : 3;
}

function flashStat(id) {
  const el = document.getElementById(id);
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 300);
}

function setDir(x, y) {
  if ((x !== 0 && dir.x !== 0) || (y !== 0 && dir.y !== 0)) return;
  nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
    W: [0,-1], S: [0,1], A: [-1,0], D: [1,0],
  };
  if (map[e.key]) {
    const [x,y] = map[e.key];
    if ((x !== 0 && dir.x !== 0) || (y !== 0 && dir.y !== 0)) return;
    nextDir = {x, y};
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  }
  if (e.key === 'p' || e.key === 'P') togglePause();
  if (e.key === ' ' && !running) startGame();
});

// Touch swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive: true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
}, {passive: true});

function drawGrid() {
  ctx.strokeStyle = COLORS.gridLine;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, WIDTH_PX);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(WIDTH_PX, i * CELL);
    ctx.stroke();
  }
}

function drawFood(x, y, color, glow, pulse) {
  const cx = x * CELL + CELL/2;
  const cy = y * CELL + CELL/2;
  const r = (CELL/2 - 2) * (pulse ? 0.88 + 0.12 * Math.sin(frameCount * 0.12) : 0.85);

  ctx.shadowColor = glow;
  ctx.shadowBlur = 12;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(cx - r*0.28, cy - r*0.28, r*0.28, 0, Math.PI*2);
  ctx.fill();
}

function drawSnake() {
  const len = snake.length;
  snake.forEach((seg, i) => {
    const t = i / (len - 1);
    const isHead = i === 0;

    let color;
    if (isHead) color = COLORS.snakeHead;
    else {
      const r1 = hexToRgb(COLORS.snakeBody);
      const r2 = hexToRgb(COLORS.snakeTail);
      color = `rgb(${Math.round(r1.r+(r2.r-r1.r)*t)},${Math.round(r1.g+(r2.g-r1.g)*t)},${Math.round(r1.b+(r2.b-r1.b)*t)})`;
    }

    const pad = isHead ? 1 : 2;
    const x = seg.x * CELL + pad;
    const y = seg.y * CELL + pad;
    const w = CELL - pad*2;

    if (isHead) {
      ctx.shadowColor = 'rgba(0,255,136,0.5)';
      ctx.shadowBlur = 8;
    }

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, w, isHead ? 4 : 3);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (isHead) {
      ctx.strokeStyle = COLORS.snakeOutline;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, w, w, 4);
      ctx.stroke();

      // eyes
      const ex = seg.x * CELL + CELL/2;
      const ey = seg.y * CELL + CELL/2;
      const eyeOffset = CELL * 0.18;
      const eyeR = CELL * 0.1;
      const eyeForward = CELL * 0.2;

      let ex1, ey1, ex2, ey2;
      if (dir.x === 1) { ex1=ex+eyeForward; ey1=ey-eyeOffset; ex2=ex+eyeForward; ey2=ey+eyeOffset; }
      else if (dir.x === -1) { ex1=ex-eyeForward; ey1=ey-eyeOffset; ex2=ex-eyeForward; ey2=ey+eyeOffset; }
      else if (dir.y === -1) { ex1=ex-eyeOffset; ey1=ey-eyeForward; ex2=ex+eyeOffset; ey2=ey-eyeForward; }
      else { ex1=ex-eyeOffset; ey1=ey+eyeForward; ex2=ex+eyeOffset; ey2=ey+eyeForward; }

      ctx.fillStyle = '#0a0a0f';
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
    }
  });
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function render() {
  requestAnimationFrame(render);
  frameCount++;

  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, WIDTH_PX, WIDTH_PX);

  drawGrid();

  if (food) drawFood(food.x, food.y, COLORS.food, COLORS.foodGlow, true);

  if (specialFood) {
    const alpha = specialFood.timer < 20 ? specialFood.timer / 20 : 1;
    ctx.globalAlpha = alpha;
    drawFood(specialFood.x, specialFood.y, COLORS.special, COLORS.specialGlow, false);
    ctx.globalAlpha = 1;
  }

  if (snake && snake.length) drawSnake();
}

// Init best from storage
best = parseInt(localStorage.getItem('snakeBest')) || 0;
updateStats();
render();

window.addEventListener('resize', () => {
  resize();
});
</script>
</body>
</html>
